name: Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a tag like v0.1.0

jobs:
  build_wheels:
    name: Build wheels for macOS (ARM64)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build wheels via Maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Explicitly target the M-series architecture
          args: --release --out dist -m crates/zanpy-py/Cargo.toml --target aarch64-apple-darwin
          sccache: 'true'

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels]
    permissions:
      id-token: write # Mandatory for Trusted Publishing
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/